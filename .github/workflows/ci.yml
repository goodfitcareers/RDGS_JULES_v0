name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: [ "5432:5432" ]
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        # It's important to specify the version of poetry to use
        # with:
        #  poetry-version: "1.8.2" # Replace with desired version
      - name: Install dependencies
        run: poetry install --no-root --with dev
      - name: Run linters
        run: poetry run ruff check . && poetry run black --check .
      - name: Run type checking
        run: poetry run mypy backend
      - name: Run tests
        run: poetry run pytest -q --cov=backend --cov-report=xml
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }} # Add CODECOV_TOKEN to repo secrets
      #     fail_ci_if_error: true
