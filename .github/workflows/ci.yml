name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: [ "5432:5432" ]
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        # It's important to specify the version of poetry to use
        # with:
        #  poetry-version: "1.8.2" # Replace with desired version
      - name: Install dependencies
        run: poetry install --no-root --with dev
      - name: Run linters
        run: poetry run ruff check . && poetry run black --check .
      - name: Run type checking
        run: poetry run mypy backend
      - name: Run tests
        run: poetry run pytest -q --cov=backend --cov-report=xml --cov-report=term-missing
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install frontend dependencies
        run: pnpm --filter frontend install
      - name: Install Playwright browsers
        run: pnpm --filter frontend exec playwright install --with-deps
      - name: Build frontend
        run: pnpm --filter frontend build
      - name: Start backend server
        run: poetry run uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
        env:
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/test_db
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_DUMMY }}
      - name: Wait for backend server
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:8000/healthz > /dev/null; do echo "Waiting for backend..."; sleep 1; done'
          echo "Backend is up!"
      - name: Run Playwright tests
        run: pnpm --filter frontend exec playwright test
        env:
          VITE_API_BASE_URL: http://localhost:8000/api
          CI: true
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }} # Add CODECOV_TOKEN to repo secrets
      #     fail_ci_if_error: true
